<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JJ Makeup</title>

    <link rel="stylesheet" href="style.css" />

    <!-- Firebase (obavezno pre script.js) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="logo">
            <h1>JJ</h1>
        </div>
    </header>

    <!-- HERO -->
    <section class="hero">
        <h2>Rezervišite svoj termin brzo i jednostavno</h2>
        <p>Ulepšajte svoj izgled profesionalnom šminkom i lash lift tretmanom.</p>

        <div class="hero-buttons">
            <a href="cenovnik.html" class="secondary-btn">Cenovnik</a>
            <a href="#zakazivanje">Zakaži termin</a>
        </div>
    </section>

    <!-- BOOKING -->
    <section id="zakazivanje">

        <h2>Zakažite termin</h2>

        <form id="bookingForm">

            <label for="service">Usluga:</label>
            <select id="service" required>
                <option value="" disabled selected>Izaberite uslugu</option>
                <option>Šminkanje — svečano</option>
                <option>Šminkanje — prirodno</option>
                <option>Lash lift</option>
            </select>

            <label for="date">Datum:</label>
            <div class="date-wrapper">
                <input type="date" id="date" required />
                <span id="dateDisplay">Izaberi datum</span>
            </div>

            <label for="time">Vreme:</label>
            <select id="time" required>
                <option value="">Izaberite datum</option>
            </select>

            <label for="name">Ime i prezime:</label>
            <input type="text" id="name" placeholder="npr. Jovana Jović" required />

            <label for="phone">Telefon:</label>
            <input type="tel" id="phone" placeholder="npr. +381 64 123 456" required />

            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="npr. ime@email.com" required />

            <button type="submit">Potvrdi termin</button>

        </form>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© <span id="year"></span> JJ Makeup | Sva prava zadržana</p>
    </footer>

    <!-- UI ELEMENTS -->
    <div id="toast"></div>
    <div id="successCard" class="success-card"></div>

    <script>
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>

    <!-- MAIN SCRIPT (posle DOM elemenata) -->
    <script src="script.js"></script>

</body>

</html>
