<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cenovnik | JJ Makeup</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">
        <h1>JJ</h1>
    </div>
</header>

<section class="hero">
    <h2>Cenovnik usluga</h2>
    <p>Odaberite uslugu koja vam najviše odgovara.</p>
</section>

<section class="pricing">

    <div class="price-card">
        <div class="price-top">
            <h3>Šminkanje — svečano</h3>
            <span>4.500 din</span>
        </div>
        <p>Trajanje: 1h</p>
    </div>

    <div class="price-card">
        <div class="price-top">
            <h3>Šminkanje — prirodno</h3>
            <span>3.000 din</span>
        </div>
        <p>Trajanje: 1h</p>
    </div>

    <div class="price-card">
        <div class="price-top">
            <h3>Lash lift</h3>
            <span>3.500 din</span>
        </div>
        <p>Trajanje: 1h</p>
    </div>

    <a href="index.html#zakazivanje" class="booking-link">
        Zakaži termin
    </a>

</section>

<footer class="footer">
    <p>© <span id="year"></span> JJ Makeup | Sva prava zadržana</p>
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
